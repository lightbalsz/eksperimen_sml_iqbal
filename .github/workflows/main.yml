name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repositori agar GitHub Actions bisa mengakses file proyek
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. Install dependencies (pandas)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas

    # 4. Jalankan script otomasi yang sudah dibuat di tahap Skilled
    - name: Run Preprocessing Script
      run: |
        cd preprocessing
        python automate_Nama-siswa.py

    # 5. Berikan izin menulis (write permission) ke GitHub token untuk push data balik
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    # 6. Commit dan Push kembali dataset hasil preprocessing ke repositori
    - name: Commit and Push Cleaned Data
      run: |
        git add preprocessing/namadataset_preprocessing/customer_churn_clean.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated: Update preprocessed data" && git push)
