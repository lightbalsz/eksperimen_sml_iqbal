name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Memaksa runner GitHub Actions menggunakan Node.js 24 untuk menghilangkan warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repositori
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 3. Install ALL dependencies (Pandas + Scikit-Learn)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn

    # 4. Menjalankan script preprocessing
    - name: Run Preprocessing Script
      run: |
        cd preprocessing
        python automate_Nama-siswa.py

    # 5. Konfigurasi Git
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    # 6. Push data bersih kembali ke repositori
    - name: Commit and Push Cleaned Data
      run: |
        git add preprocessing/namadataset_preprocessing/customer_churn_clean.csv || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated: Update preprocessed data" && git push)