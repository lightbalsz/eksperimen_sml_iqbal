name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    # 1. Menggunakan v4 terbaru untuk mengatasi warning Node.js
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Menggunakan v5 terbaru untuk mengatasi warning Node.js
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 3. Upgrade pip dan install pandas
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas

    # 4. Menjalankan script dengan pengecekan folder otomatis
    - name: Run Preprocessing Script
      run: |
        cd preprocessing
        python automate_Nama-siswa.py

    # 5. Konfigurasi Git untuk proses commit balik ke repo
    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    # 6. Push data bersih ke repositori (hanya jika ada perubahan data)
    - name: Commit and Push Cleaned Data
      run: |
        git add preprocessing/namadataset_preprocessing/customer_churn_clean.csv || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated: Update preprocessed data" && git push)